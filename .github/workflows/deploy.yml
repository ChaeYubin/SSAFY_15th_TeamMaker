name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        type: choice
        default: test
        options:
          - test
          - prod
  schedule:
    # Asia/Seoul (UTC+9) 수 08:30 = UTC 화 23:30
    - cron: "30 23 * * 2"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 현재 repository 체크아웃
      - uses: actions/checkout@v5

      # Node.js 설치
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      # npm i
      - name: Install dependencies
        run: npm install

      # 스크립트 실행
      - name: Run team generation
        env:
          MM_WEBHOOK_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'test' && secrets.MM_WEBHOOK_TEST_URL || secrets.MM_WEBHOOK_URL }}
          MEMBERS: ${{ secrets.MEMBERS }}
        run: node index.js

      # 새로 만든 파일 GitHub에 자동 커밋
      - name: Commit generated files
        run: |
          git config user.email ${{ secrets.USER_EMAIL }}
          git config user.name ${{ secrets.USER_NAME }}
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          DATE=$(TZ=Asia/Seoul date +'%Y-%m-%d')
          git commit -m "docs: add ${DATE} team"
          git push origin HEAD:main
